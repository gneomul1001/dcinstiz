<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디시인스티즈 - DC-Instiz Proto</title>
    <style>
        /* Global Styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "맑은 고딕", helvetica, "Apple SD Gothic Neo", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f2f5; /* PC에서 배경과 콘텐츠를 구분하기 위한 톤다운 */
            color: #333;
            user-select: none;
        }

        :root {
            --instiz-green: #28C76F;
            --light-gray: #f0f0f0;
            --medium-gray: #bbb;
            --dark-gray: #666;
            --border-color: #e5e5e5;
        }

        /* 메인 컨테이너 (반응형) */
        .app-container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.05);
            padding-bottom: 60px; /* 하단 메뉴 공간 확보 */
        }

        /* Header */
        .header {
            height: 56px;
            background: var(--instiz-green);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            color: white;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .header .logo {
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .header .icons {
            display: flex;
            gap: 16px;
            font-size: 18px;
            cursor: pointer;
        }

        /* Search Bar */
        #search-container {
            display: none;
            background: white;
            padding: 8px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        #search-container input {
            width: calc(100% - 20px);
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        /* Category Bar (Scrollable) */
        .category-bar {
            height: 48px;
            background: white;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 16px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        .category-bar span {
            margin-right: 18px;
            color: #333;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
        }

        .category-bar span.active {
            color: var(--instiz-green);
            font-weight: bold;
            border-bottom: 2px solid var(--instiz-green);
            padding-bottom: 13px;
        }

        /* Floating Green Button */
        .floating-btn {
            position: fixed;
            bottom: 80px;
            right: max(16px, calc(50% - 284px)); /* 화면 너비에 맞춰 버튼 위치 조정 */
            background: var(--instiz-green);
            width: 56px;
            height: 56px;
            border-radius: 28px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
            cursor: pointer;
        }

        /* Content Area */
        #content-area {
            padding: 16px;
            background-color: white;
        }

        .homepage-ad { width: 100%; height: auto; margin-bottom: 16px; border-radius: 8px; }
        .homepage-section-title { color: var(--instiz-green); font-weight: bold; margin-bottom: 12px; font-size: 18px; }
        .post-card { border-bottom: 1px solid var(--border-color); padding: 12px 0; display: flex; align-items: flex-start; cursor: pointer; }
        .post-card:hover { background-color: #fbfbfb; }
        .post-type { font-size: 12px; color: #777; border: 1px solid #ccc; padding: 1px 4px; margin-right: 8px; border-radius: 2px; }
        .post-title { font-size: 15px; flex: 1; line-height: 1.4; }
        .post-image-preview { width: 50px; height: 50px; margin-left: 10px; background-size: cover; background-position: center; border-radius: 4px; }
        .post-comments { color: var(--instiz-green); font-size: 13px; margin-left: 5px; }

        /* Fake Mobile OS Bottom Menu */
        .bottom-menu {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 600px;
            height: 60px;
            background: white;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 18px;
            color: var(--dark-gray);
            z-index: 50;
        }

        .bottom-menu-icon { text-align: center; cursor: pointer; width: 25%; }
        .bottom-menu-icon span { font-size: 11px; display: block; margin-top: 2px; }
        .bottom-menu .home { color: var(--instiz-green); }

        /* =========================================
           Modal (Popup) Styles - Post & Categories
           ========================================= */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #fff;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            border-radius: 16px;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            z-index: 10;
        }
        .modal-header h2 { margin: 0; font-size: 18px; font-weight: bold; }
        .btn-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #333; }

        .modal-body { padding: 20px; flex-grow: 1; overflow-y: auto; }

        /* 카테고리 관리 모달 전용 */
        .cat-list { list-style: none; padding: 0; margin: 0 0 20px 0; }
        .cat-list li {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid #eee;
        }
        .cat-actions button {
            background: #eee; border: 1px solid #ddd; padding: 5px 10px;
            border-radius: 4px; font-size: 12px; cursor: pointer; margin-left: 5px;
        }
        .cat-actions button.del-btn { background: #ffebee; color: #c62828; border-color: #ffcdd2; }
        .cat-add-area { display: flex; gap: 10px; }
        .cat-add-area input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .cat-add-area button { padding: 8px 16px; background: var(--instiz-green); color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* 게시글 보기 모달 전용 */
        .post-meta { font-size: 13px; color: #777; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .post-author { display: flex; align-items: center; gap: 5px; font-size: 13px; }
        .post-title-main { font-size: 22px; font-weight: bold; line-height: 1.4; margin-top: 0; margin-bottom: 15px; }
        .post-content-text { font-size: 16px; line-height: 1.6; color: #1a1a1a; margin-bottom: 30px; }
        .post-action-bar { display: flex; justify-content: center; gap: 10px; margin-top: 20px; border-top: 1px solid var(--border-color); padding: 16px 0; }
        .post-action-btn { border: 1px solid #ccc; background: white; padding: 8px 16px; border-radius: 20px; font-size: 14px; cursor: pointer; }
        
        .comment-section { border-top: 1px solid var(--border-color); padding-top: 16px; }
        .comment { display: flex; align-items: flex-start; margin-bottom: 16px; border-bottom: 1px solid #eee; padding-bottom: 16px; position: relative; }
        .comment .avatar { font-size: 20px; margin-right: 10px; }
        .comment .content { flex: 1; }
        .comment .author-meta { font-size: 13px; display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
        .comment .author-meta .name { font-weight: bold; }
        .comment .author-meta .is-me { background: var(--instiz-green); color: white; font-size: 11px; border-radius: 10px; padding: 2px 6px; }
        .comment .time { color: #777; font-size: 11px; }
        .comment .text { font-size: 15px; line-height: 1.4; margin-bottom: 5px; }
        .comment-delete-btn { background: none; border: none; color: #ee5253; cursor: pointer; font-size: 12px; position: absolute; right: 0; top: 0; }

        /* 모달 내 댓글 입력창 */
        .comment-input-area {
            position: sticky; bottom: 0; background: white; border-top: 1px solid var(--border-color); padding: 15px; display: flex; gap: 10px; z-index: 10;
        }
        .comment-input-area input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 20px; outline: none; font-size: 14px; }
        .comment-input-area button { background: var(--instiz-green); color: white; border: none; border-radius: 20px; padding: 0 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="logo">
            <span style="font-size: 24px;">✅</span>
            <span>디시인스티즈</span>
        </div>
        <div class="icons">
            <span>✈️</span>
            <span style="position: relative;">🔔<span style="font-size: 10px; position: absolute; top:-5px; right:-5px; color: white; background: red; border-radius: 50%; padding: 2px 4px;">12</span></span>
            <span id="search-icon">🔍</span>
            <span onclick="openCategoryModal()">☰</span>
        </div>
    </div>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="검색어를 입력하세요...">
    </div>

    <div class="category-bar" id="cat-bar">
        </div>

    <div class="floating-btn">인기글</div>

    <div id="content-area">
        <div id="view-homepage">
            </div>
    </div>

    <div class="bottom-menu">
        <div class="bottom-menu-icon home">🏠 <span>홈</span></div>
        <div class="bottom-menu-icon">🔥 <span>인기글</span></div>
        <div class="bottom-menu-icon">💬 <span>채팅</span></div>
        <div class="bottom-menu-icon">... <span>더보기</span></div>
    </div>
</div>

<div class="modal-overlay" id="categoryModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2>카테고리 관리</h2>
            <button class="btn-close" onclick="closeModal('categoryModal')">×</button>
        </div>
        <div class="modal-body">
            <ul class="cat-list" id="cat-manage-list">
                </ul>
            <div class="cat-add-area">
                <input type="text" id="new-cat-name" placeholder="새 카테고리명 입력">
                <button onclick="addCategory()">추가</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="postModal">
    <div class="modal-content" style="max-height: 95vh;">
        <div class="modal-header">
            <h2 id="modal-post-type" style="color:var(--instiz-green); font-size:16px;">게시판</h2>
            <button class="btn-close" onclick="closeModal('postModal')">×</button>
        </div>
        <div class="modal-body" id="post-modal-body">
            <div class="post-meta">
                <div class="post-author">✅ 익명 <span>...</span></div>
                <div id="modal-post-info">조회 0 | 댓글 0</div>
            </div>
            <h1 class="post-title-main" id="modal-post-title">제목</h1>
            <div class="post-content-text" id="modal-post-content">내용</div>
            
            <div class="post-action-bar">
                <button class="post-action-btn">🔖 스크랩</button>
                <button class="post-action-btn">👍 추천</button>
            </div>

            <div class="comment-section" id="modal-comment-section">
                </div>
        </div>
        <div class="comment-input-area">
            <input type="text" id="new-comment-text" placeholder="댓글을 남겨보세요." onkeypress="if(event.key === 'Enter') addComment()">
            <button onclick="addComment()">등록</button>
        </div>
    </div>
</div>

<script>
    // --- LocalStorage 설정 및 기본 데이터 ---
    const defaultCategories = ["HOT", "이슈", "일상", "연예", "드영배", "장터"];
    const defaultPosts = [
        { id: 1, type: "일상", title: "주말에 글 많은 거 너무 신기함", image: null, author: "익명", views: 12, body: "여기 여초인데 여자들은 다 주말에 약속있고 그러지 않나? 왜 나같은 아싸랑 같이 여기서 글 쓰고 있는 거임" },
        { id: 2, type: "연예", title: "나 진짜 김지민 친친에 들어가고 싶음...", image: 'https://via.placeholder.com/50/ff9999', author: "익명", views: 45, body: "친친 너무 부러움..." },
        { id: 3, type: "이슈", title: "인플루언서들은 다 이래??", image: 'https://via.placeholder.com/50/99ff99', author: "익명", views: 120, body: "다들 협찬만 받고 사는듯" },
        { id: 4, type: "정보기타", title: "추미애 아들 추씨 아닌 거 들을 때마다 충격...", image: null, author: "익명", views: 33, body: "몰랐음..." }
    ];
    const defaultComments = [
        { id: 101, postId: 1, author: "익인1", text: "냐도 신기해ㅜㅠ", date: "지금막", isMe: false }
    ];

    // 스토리지에서 불러오거나 기본값 세팅
    let categories = JSON.parse(localStorage.getItem('dcInstiz_categories')) || defaultCategories;
    let posts = JSON.parse(localStorage.getItem('dcInstiz_posts')) || defaultPosts;
    let postComments = JSON.parse(localStorage.getItem('dcInstiz_comments')) || defaultComments;
    
    let currentOpenPostId = null; // 현재 열려있는 게시글 ID 저장

    function saveData() {
        localStorage.setItem('dcInstiz_categories', JSON.stringify(categories));
        localStorage.setItem('dcInstiz_posts', JSON.stringify(posts));
        localStorage.setItem('dcInstiz_comments', JSON.stringify(postComments));
    }

    // --- Core UI Functions ---
    function renderCategories() {
        const bar = document.getElementById('cat-bar');
        bar.innerHTML = '';
        categories.forEach((cat, index) => {
            const span = document.createElement('span');
            span.textContent = cat;
            if (index === 0) span.classList.add('active'); // 첫번째 항목 활성화
            span.onclick = () => {
                document.querySelectorAll('.category-bar span').forEach(s => s.classList.remove('active'));
                span.classList.add('active');
            };
            bar.appendChild(span);
        });
    }

    function renderPostList() {
        const listArea = document.getElementById('view-homepage');
        listArea.innerHTML = `
            <div class="homepage-section-title">전체 인기글</div>
        `;

        posts.forEach(p => {
            // 해당 게시글의 댓글 수 계산
            const commentCount = postComments.filter(c => c.postId === p.id).length;

            const postCard = document.createElement('div');
            postCard.classList.add('post-card');
            postCard.onclick = () => openPostModal(p.id);

            const titleSpan = document.createElement('span');
            titleSpan.classList.add('post-title');
            titleSpan.innerHTML = `<span class="post-type">${p.type}</span> ${p.title} <span class="post-comments">${commentCount > 0 ? commentCount : ''}</span>`;

            postCard.appendChild(titleSpan);

            if (p.image) {
                const imgPreview = document.createElement('div');
                imgPreview.classList.add('post-image-preview');
                imgPreview.style.backgroundImage = `url('${p.image}')`;
                postCard.appendChild(imgPreview);
            }

            listArea.appendChild(postCard);
        });
    }

    // --- Search Feature ---
    document.getElementById('search-icon').onclick = () => {
        const container = document.getElementById('search-container');
        container.style.display = container.style.display === 'block' ? 'none' : 'block';
    };

    // --- Category Management (Modal) ---
    function openCategoryModal() {
        document.getElementById('categoryModal').style.display = 'flex';
        renderCategoryManageList();
    }

    function renderCategoryManageList() {
        const list = document.getElementById('cat-manage-list');
        list.innerHTML = '';
        categories.forEach((cat, index) => {
            const li = document.createElement('li');
            li.innerHTML = `
                <span>${cat}</span>
                <div class="cat-actions">
                    <button onclick="renameCategory(${index})">수정</button>
                    <button class="del-btn" onclick="deleteCategory(${index})">삭제</button>
                </div>
            `;
            list.appendChild(li);
        });
    }

    function addCategory() {
        const name = document.getElementById('new-cat-name').value.trim();
        if (name && !categories.includes(name)) {
            categories.push(name);
            saveData();
            renderCategories();
            renderCategoryManageList();
            document.getElementById('new-cat-name').value = '';
        } else if (categories.includes(name)) {
            alert('이미 존재하는 카테고리입니다.');
        }
    }

    function deleteCategory(index) {
        if(confirm(`'${categories[index]}' 카테고리를 삭제하시겠습니까?`)) {
            categories.splice(index, 1);
            saveData();
            renderCategories();
            renderCategoryManageList();
        }
    }

    function renameCategory(index) {
        const newName = prompt('새 카테고리명을 입력하세요:', categories[index]);
        if (newName && newName.trim() !== '') {
            categories[index] = newName.trim();
            saveData();
            renderCategories();
            renderCategoryManageList();
        }
    }

    // --- Post & Comment Management (Modal) ---
    function openPostModal(postId) {
        currentOpenPostId = postId;
        const post = posts.find(p => p.id === postId);
        if(!post) return;

        // 데이터 채우기
        document.getElementById('modal-post-type').textContent = post.type;
        document.getElementById('modal-post-title').textContent = post.title;
        document.getElementById('modal-post-content').innerHTML = (post.body || '').replace(/\n/g, '<br>');
        
        // 조회수 등 표시
        const commentCount = postComments.filter(c => c.postId === postId).length;
        document.getElementById('modal-post-info').textContent = `조회 ${post.views} | 댓글 ${commentCount}`;

        renderComments(postId);
        
        // 모달 띄우기
        document.getElementById('postModal').style.display = 'flex';
    }

    function renderComments(postId) {
        const commentArea = document.getElementById('modal-comment-section');
        commentArea.innerHTML = ''; 
        const commentsToRender = postComments.filter(c => c.postId === postId);

        if(commentsToRender.length === 0) {
            commentArea.innerHTML = '<p style="color:#999; font-size:14px; text-align:center;">첫 댓글을 남겨보세요!</p>';
            return;
        }

        commentsToRender.forEach(c => {
            const commentDiv = document.createElement('div');
            commentDiv.classList.add('comment');
            if (c.isMe) commentDiv.style.backgroundColor = '#f1f8e9'; // 내가 쓴 글 배경색

            commentDiv.innerHTML = `
                <div class="avatar">👤</div>
                <div class="content">
                    <div class="author-meta">
                        <span class="name">${c.author}</span>
                        ${c.isMe ? '<span class="is-me">나</span>' : ''}
                    </div>
                    <div class="text">${c.text}</div>
                    <div class="time">${c.date} <span style="cursor:pointer; color:#999; margin-left:10px;">답글</span></div>
                </div>
                ${c.isMe ? `<button class="comment-delete-btn" onclick="deleteComment(${c.id})">삭제</button>` : ''}
            `;
            commentArea.appendChild(commentDiv);
        });
    }

    function addComment() {
        const textInput = document.getElementById('new-comment-text');
        const text = textInput.value.trim();
        if (text && currentOpenPostId !== null) {
            const newComment = {
                id: Date.now(),
                postId: currentOpenPostId,
                author: "익명(나)", 
                text: text,
                date: "방금 전",
                isMe: true
            };
            postComments.push(newComment);
            saveData();
            
            // UI 업데이트
            renderComments(currentOpenPostId);
            renderPostList(); // 메인 피드 댓글수 갱신
            
            // 댓글수 업데이트
            const post = posts.find(p => p.id === currentOpenPostId);
            const commentCount = postComments.filter(c => c.postId === currentOpenPostId).length;
            document.getElementById('modal-post-info').textContent = `조회 ${post.views} | 댓글 ${commentCount}`;
            
            textInput.value = '';
            
            // 스크롤 하단으로 이동
            const modalBody = document.getElementById('post-modal-body');
            modalBody.scrollTop = modalBody.scrollHeight;
        }
    }

    function deleteComment(commentId) {
        if(confirm('댓글을 삭제하시겠습니까?')) {
            postComments = postComments.filter(c => c.id !== commentId);
            saveData();
            
            renderComments(currentOpenPostId);
            renderPostList(); // 메인 피드 댓글수 갱신
            
            const post = posts.find(p => p.id === currentOpenPostId);
            const commentCount = postComments.filter(c => c.postId === currentOpenPostId).length;
            document.getElementById('modal-post-info').textContent = `조회 ${post.views} | 댓글 ${commentCount}`;
        }
    }

    // --- Modal 공통 기능 ---
    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
        if(modalId === 'postModal') {
            currentOpenPostId = null;
        }
    }

    // 모달 바깥 영역 클릭 시 닫기
    window.onclick = function(event) {
        if (event.target.classList.contains('modal-overlay')) {
            event.target.style.display = "none";
            if(event.target.id === 'postModal') currentOpenPostId = null;
        }
    }

    // --- Initialization ---
    renderCategories();
    renderPostList();
</script>

</body>
</html>
