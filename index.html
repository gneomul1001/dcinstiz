<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디시인스티즈 - DC-Instiz Proto</title>
    <style>
        /* Global Styles */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Malgun Gothic", "맑은 고딕", helvetica, "Apple SD Gothic Neo", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
            user-select: none; /* Make text unselectable to feel like a phone app */
        }

        /* Color Scheme */
        :root {
            --instiz-green: #28C76F;
            --light-gray: #f0f0f0;
            --medium-gray: #bbb;
            --dark-gray: #666;
            --border-color: #e5e5e5;
        }

        /* Mobile Container to mimic a phone screen */
        .phone-container {
            width: 375px; /* Common mobile screen width */
            height: 812px; /* Common mobile screen height */
            background: #fff;
            margin: 20px auto;
            border: 10px solid #222;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Fake Status Bar */
        .status-bar {
            height: 44px;
            background: #28C76F;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .status-bar .right-icons {
            display: flex;
            gap: 5px;
        }

        /* Header (like images 0, 1, 2) */
        .header {
            height: 56px;
            background: var(--instiz-green);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            color: white;
        }

        .header .logo {
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .header .logo img {
            height: 24px;
            border-radius: 50%;
        }

        .header .icons {
            display: flex;
            gap: 16px;
            font-size: 18px;
        }

        /* Search Bar (Hidden by default, triggered by icon) */
        #search-container {
            display: none;
            background: white;
            padding: 8px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        #search-container input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        /* Category Bar (Scrollable) */
        .category-bar {
            height: 48px;
            background: white;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            padding: 0 16px;
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }

        .category-bar span {
            margin-right: 18px;
            color: #333;
            font-weight: 500;
            font-size: 15px;
            cursor: pointer;
        }

        .category-bar span.active {
            color: var(--instiz-green);
            font-weight: bold;
            border-bottom: 2px solid var(--instiz-green);
            padding-bottom: 13px;
        }

        /* Category Management Panel */
        #category-mgmt {
            display: none;
            background: white;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        #category-mgmt button {
            margin-right: 5px;
            background: var(--light-gray);
            border: 1px solid #ccc;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
        }

        /* Floating Green "인기글" Button */
        .floating-btn {
            position: absolute;
            bottom: 60px;
            right: 16px;
            background: var(--instiz-green);
            width: 56px;
            height: 56px;
            border-radius: 28px;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            line-height: 1.2;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }

        /* Post Body (Content area) */
        #content-area {
            height: calc(812px - 44px - 56px - 48px - 1px - 60px); /* Total height - status - header - cat - border - bottom menu */
            overflow-y: auto;
            padding: 16px;
            background-color: white;
        }

        /* Homepage View (as in image_2.png) */
        #view-homepage {
            display: block;
        }

        .homepage-ad {
            width: 100%;
            height: auto;
            margin-bottom: 16px;
        }

        .homepage-section-title {
            color: var(--instiz-green);
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 18px;
        }

        .post-card {
            border-bottom: 1px solid var(--border-color);
            padding: 12px 0;
            display: flex;
            align-items: flex-start;
            cursor: pointer;
        }

        .post-type {
            font-size: 12px;
            color: #777;
            border: 1px solid #ccc;
            padding: 1px 4px;
            margin-right: 8px;
            border-radius: 2px;
        }

        .post-title {
            font-size: 15px;
            flex: 1;
            line-height: 1.4;
        }

        .post-image-preview {
            width: 50px;
            height: 50px;
            margin-left: 10px;
            background-size: cover;
            border-radius: 4px;
        }

        .post-comments {
            color: var(--instiz-green);
            font-size: 13px;
            margin-left: 5px;
        }

        /* Post View (as in image_1.png) */
        #view-post {
            display: none;
        }

        .post-header {
            margin-bottom: 16px;
        }

        .post-meta {
            font-size: 13px;
            color: #777;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #post-date-text {
            color: #777;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 13px;
        }

        .post-author img {
            height: 16px;
            border-radius: 50%;
        }

        .post-title-main {
            font-size: 19px;
            font-weight: bold;
            line-height: 1.3;
        }

        .post-content-text {
            font-size: 16px;
            line-height: 1.6;
            color: #1a1a1a;
            margin-bottom: 30px;
        }

        /* Date Manipulation Controls (for demo) */
        #date-controls {
            background: #fff8e1;
            padding: 10px;
            margin-bottom: 16px;
            border: 1px solid #ffe082;
            border-radius: 4px;
        }

        #date-controls input {
            width: 70px;
            font-size: 12px;
        }

        #date-controls button {
            font-size: 12px;
        }

        /* Specific Ad for Comment View (image_0.png) */
        .comment-ad {
            margin-top: 10px;
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
        }

        /* Comments Section (as in image_0.png) */
        #comment-section {
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
        }

        .comment {
            display: flex;
            align-items: flex-start;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 16px;
            position: relative;
        }

        .comment .avatar {
            font-size: 18px;
            margin-right: 10px;
        }

        .comment .content {
            flex: 1;
        }

        .comment .author-meta {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 2px;
        }

        .comment .author-meta .name {
            font-weight: bold;
        }

        .comment .author-meta .is-me {
            background: var(--instiz-green);
            color: white;
            font-size: 11px;
            border-radius: 10px;
            padding: 1px 6px;
        }

        .comment .author-meta .time {
            color: #777;
            font-size: 11px;
        }

        .comment .text {
            font-size: 15px;
            line-height: 1.4;
        }

        .comment-delete-btn {
            position: absolute;
            top: 10px;
            right: 0;
            background: none;
            border: none;
            color: #ee5253;
            cursor: pointer;
            font-size: 12px;
        }

        /* Comment Input Box (as in image_0.png) */
        #comment-input-area {
            position: absolute;
            bottom: 60px;
            left: 0;
            width: 100%;
            background: white;
            border-top: 1px solid var(--border-color);
            padding: 12px 16px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            z-index: 5;
        }

        #comment-input-area .avatar-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }

        #comment-input-area .fake-input-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #comment-input-area .meta-row {
            font-size: 13px;
            color: #999;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #comment-input-area .meta-row strong {
            color: #333;
        }

        #comment-input-area .input-box-main {
            border: 1px solid var(--border-color);
            background: var(--light-gray);
            padding: 10px;
            border-radius: 8px;
            min-height: 60px;
        }

        #comment-input-area textarea {
            width: 100%;
            border: none;
            background: transparent;
            resize: none;
            outline: none;
            font-size: 15px;
            font-family: inherit;
        }

        #comment-input-area .submit-row {
            display: flex;
            align-items: center;
            border-top: 1px solid var(--border-color);
            background: var(--light-gray);
            padding: 8px;
            border-radius: 0 0 8px 8px;
            margin-top: -1px;
            justify-content: space-between;
        }

        #comment-input-area .add-icon {
            font-size: 20px;
            color: var(--dark-gray);
            background: #e1f5fe;
            width: 30px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #comment-input-area .confirm-text {
            color: #777;
            font-size: 13px;
        }

        /* Action bar for post (from image_1.png) */
        .post-action-bar {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            border-top: 1px solid var(--border-color);
            padding-top: 16px;
            padding-bottom: 16px;
        }

        .post-action-btn {
            border: 1px solid #ccc;
            background: white;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Fake Mobile OS Bottom Menu */
        .bottom-menu {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60px;
            background: white;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 18px;
            color: var(--dark-gray);
        }

        .bottom-menu-icon {
            text-align: center;
        }

        .bottom-menu-icon span {
            font-size: 11px;
            display: block;
            margin-top: 2px;
        }

        .bottom-menu .home {
            color: var(--instiz-green);
        }
    </style>
</head>
<body>

<div class="phone-container">
    <!-- Fake Status Bar -->
    <div class="status-bar">
        <span>U+ 2:56</span>
        <div class="right-icons">
            <span>📶</span> <span>(29)</span>
        </div>
    </div>

    <!-- Header (디시인스티즈 name as requested) -->
    <div class="header">
        <div class="logo">
            <!-- Green check smiley logo approximation -->
            <span style="font-size: 24px;">✅</span>
            <span>디시인스티즈</span>
        </div>
        <div class="icons">
            <span>✈️</span> <span>🔔<span style="font-size: 10px; position: absolute; color: red;">12</span></span> <span id="search-icon">🔍</span> <span>☰</span>
        </div>
    </div>

    <!-- Search input (Initially hidden) -->
    <div id="search-container">
        <input type="text" id="search-input" placeholder="검색어를 입력하세요...">
    </div>

    <!-- Category Bar -->
    <div class="category-bar" id="cat-bar">
        <!-- Rendered by JS -->
    </div>

    <!-- Category Management Panel -->
    <div id="category-mgmt">
        <span>카테고리 관리: </span>
        <input type="text" id="new-cat-name" placeholder="카테고리명">
        <button onclick="addCategory()">추가</button>
        <button onclick="deleteCategory()">삭제</button>
        <button onclick="renameCategory()">수정</button>
    </div>

    <!-- Floating "인기글" Button -->
    <div class="floating-btn">
        인기글
    </div>

    <!-- Main Content Area -->
    <div id="content-area">

        <!-- Homepage View (Like image_2.png) -->
        <div id="view-homepage">
            <img src="images/ad_girl_y2k.jpg" alt="AD" class="homepage-ad"> <!-- Placeholder for image_2.png top ad -->
            <div class="homepage-section-title">내가 마지막에 본 글 <span style="font-size: 13px; color: red;">🗑️</span></div>
            <div class="post-card" onclick="openPost(1)">
                <span class="post-type">잡담</span>
                <span class="post-title">여자들이 한심하게 보는 남자 특징 <span class="post-comments">4</span></span>
                <div class="post-image-preview" style="background-image: url('images/baked_goods.jpg');"></div> <!-- image_2.png baked goods approximation -->
            </div>

            <div class="homepage-section-title" style="margin-top: 20px;">전체 인기글</div>
            <!-- Rendered by JS -->
        </div>

        <!-- Post View (Like image_1.png and image_0.png combined) -->
        <div id="view-post">
            <div class="post-header">
                <!-- Date Manipulation Controls (demo purpose) -->
                <div id="date-controls">
                    날짜 조작: <input type="text" id="fake-date-input" placeholder="14초전">
                    <button onclick="updatePostDate()">변경</button>
                </div>

                <div class="post-meta">
                    <div class="post-author"><img src="images/post_icon.png" alt="icon"> 인스티즈 <span>...</span></div>
                    <div>
                        <span id="post-date-text">14초전</span> | 조회 4 | 현재 4
                    </div>
                </div>
                <h1 class="post-title-main">근데 주말에 이렇게 글 많은 거 난 너무 신기함</h1>
            </div>

            <div class="post-content-text">
                여기 여초인데 여자들은 다 주말에 약속있고 그러지 않나? 왜 나같은 아싸랑 같이 여기서 글 쓰고 있는 거임
            </div>

            <div class="post-action-bar">
                <button class="post-action-btn">🔖</button>
                <button class="post-action-btn">👍</button>
                <button class="post-action-btn">...</button>
            </div>

            <!-- Comment View Specific Ad (as in image_0.png) -->
            <div class="comment-ad ad-pans">
                <img src="images/ad_pans.png" alt="Coupang Ad" style="width: 100%; border-radius: 4px;">
            </div>

            <!-- Comment Section -->
            <div id="comment-section">
                <!-- Rendered by JS -->
            </div>
        </div>
    </div> <!-- End Content Area -->

    <!-- Comment Input Box (Static for demo) (Visible only in post view) -->
    <div id="comment-input-area" style="display: none;">
        <div class="avatar-box">
            <span>U+</span> <span>🕒</span> <span>✅</span>
        </div>
        <div class="fake-input-container">
            <div class="meta-row">
                <strong>댓글 입력</strong> <span>...</span> <span style="position: absolute; right: 16px; border: 1px solid #ccc; padding: 1px 6px; border-radius: 10px; font-size: 11px;">댓글 기능</span>
            </div>
            <div class="input-box-main">
                <textarea id="new-comment-text" rows="2" placeholder="댓글을 입력해주세요."></textarea>
            </div>
            <div class="submit-row">
                <div class="add-icon">+</div>
                <div class="confirm-text" onclick="addComment()">확인 또는 엔터키 연타</div>
            </div>
        </div>
    </div>

    <!-- Fake Mobile Bottom Menu -->
    <div class="bottom-menu">
        <div class="bottom-menu-icon home">🏠 <span>홈</span></div>
        <div class="bottom-menu-icon">🔥 <span>인기글</span></div>
        <div class="bottom-menu-icon">💬 <span>채팅</span></div>
        <div class="bottom-menu-icon">... <span>더보기</span></div>
    </div>
</div>

<script>
    // --- Data ---
    let categories = ["HOT", "이슈", "일상", "연예", "드영배", "장터"];
    let posts = [
        { id: 1, type: "일상", title: "주말에 글 많은 거 너무 신기함", image: null, author: "익인1", date: "14초전", views: 4, comments: 2, body: "여기 여초인데... 왜 나같은 아싸랑 같이 여기서 글 쓰고 있는 거임" },
        { id: 2, type: "일상", title: "나 ㅈㅈ하게 김지민 친친에 들어가고 싶음...", image: 'images/girl_glasses.jpg', comments: 7 },
        { id: 3, type: "일상", title: "인플루언서들은 다 이래??", image: 'images/baked_goods.jpg', comments: 21 },
        { id: 4, type: "정보기타", title: "추미애 아들 추씨 아닌 거 들을 때마다 충격...", image: null, comments: 11 }
    ];
    let postComments = [
        { id: 101, postId: 1, author: "익인1", text: "냐도 신기해ㅜㅠ", date: "지금막" }
    ];

    // --- Core UI Functions ---

    function renderCategories() {
        const bar = document.getElementById('cat-bar');
        bar.innerHTML = '';
        categories.forEach((cat, index) => {
            const span = document.createElement('span');
            span.textContent = cat;
            if (index === 0) span.classList.add('active'); // Default active
            span.onclick = () => {
                document.querySelectorAll('.category-bar span').forEach(s => s.classList.remove('active'));
                span.classList.add('active');
            };
            bar.appendChild(span);
        });
    }

    function renderPostList() {
        const listArea = document.getElementById('view-homepage');
        // Keep the ad and section titles
        listArea.innerHTML = `
            <img src="images/ad_girl_y2k.jpg" alt="AD" class="homepage-ad">
            <div class="homepage-section-title">내가 마지막에 본 글 <span style="font-size: 13px; color: red;">🗑️</span></div>
            <div class="post-card" onclick="openPost(1)">
                <span class="post-type">잡담</span>
                <span class="post-title">여자들이 한심하게 보는 남자 특징 <span class="post-comments">4</span></span>
                <div class="post-image-preview" style="background-image: url('images/baked_goods.jpg');"></div>
            </div>
            <div class="homepage-section-title" style="margin-top: 20px;">전체 인기글</div>
        `;

        // Render from 'posts' array, starting from index 1 to match image_2.png list
        for (let i = 1; i < posts.length; i++) {
            const p = posts[i];
            const postCard = document.createElement('div');
            postCard.classList.add('post-card');
            postCard.onclick = () => openPost(p.id);

            const titleSpan = document.createElement('span');
            titleSpan.classList.add('post-title');
            titleSpan.innerHTML = `<span class="post-type">${p.type}</span> ${p.title} <span class="post-comments">${p.comments}</span>`;

            postCard.appendChild(titleSpan);

            if (p.image) {
                const imgPreview = document.createElement('div');
                imgPreview.classList.add('post-image-preview');
                imgPreview.style.backgroundImage = `url('${p.image}')`;
                postCard.appendChild(imgPreview);
            }

            listArea.appendChild(postCard);
        }
    }

    // --- Search Feature ---
    document.getElementById('search-icon').onclick = () => {
        const container = document.getElementById('search-container');
        container.style.display = container.style.display === 'block' ? 'none' : 'block';
    };

    document.getElementById('search-input').onkeyup = (e) => {
        const query = e.target.value.toLowerCase();
        if (query.length > 1) {
            // Very simple filter for this proto
            console.log("Searching for: " + query);
        }
    };

    // --- Category Management Functions ---
    document.querySelector('.header .icons span:last-child').onclick = () => {
        const mgmt = document.getElementById('category-mgmt');
        mgmt.style.display = mgmt.style.display === 'block' ? 'none' : 'block';
    };

    function addCategory() {
        const name = document.getElementById('new-cat-name').value;
        if (name) {
            categories.push(name);
            renderCategories();
            document.getElementById('new-cat-name').value = '';
        }
    }

    function deleteCategory() {
        const activeCat = document.querySelector('.category-bar span.active').textContent;
        categories = categories.filter(c => c !== activeCat);
        renderCategories();
    }

    function renameCategory() {
        const newName = document.getElementById('new-cat-name').value;
        if (!newName) return;
        const activeSpan = document.querySelector('.category-bar span.active');
        const oldName = activeSpan.textContent;
        const index = categories.indexOf(oldName);
        if (index !== -1) {
            categories[index] = newName;
            renderCategories();
            document.getElementById('new-cat-name').value = '';
        }
    }

    // --- Date Manipulation Function ---
    function updatePostDate() {
        const newDate = document.getElementById('fake-date-input').value;
        if (newDate) {
            document.getElementById('post-date-text').textContent = newDate;
        }
    }

    // --- Comment Manipulation Functions ---

    function renderComments(postId) {
        const commentArea = document.getElementById('comment-section');
        commentArea.innerHTML = ''; // Clear previous

        const commentsToRender = postComments.filter(c => c.postId === postId);

        commentsToRender.forEach(c => {
            const commentDiv = document.createElement('div');
            commentDiv.classList.add('comment');
            if (c.author === "익인1") commentDiv.style.backgroundColor = '#f1f8e9'; // Match image_0.png green bg for user's comment

            commentDiv.innerHTML = `
                <div class="avatar">✅</div>
                <div class="content">
                    <div class="author-meta">
                        <span class="name">${c.author}</span>
                        ${c.author === "익인1" ? '<span class="is-me">나</span>' : ''}
                        <span>...</span>
                    </div>
                    <div class="text">${c.text}</div>
                    <div class="author-meta">
                        <span class="is-me" style="background:var(--light-gray); color:var(--dark-gray); font-weight:normal;">답글</span>
                        <span class="time">${c.date}</span>
                    </div>
                </div>
                <button class="comment-delete-btn" onclick="deleteComment(${c.id}, ${postId})">삭제</button>
            `;
            commentArea.appendChild(commentDiv);
        });
    }

    function addComment() {
        const text = document.getElementById('new-comment-text').value;
        if (text) {
            const newComment = {
                id: Date.now(),
                postId: 1, // hardcoded to post 1 for this demo
                author: "익인1", // hardcoded
                text: text,
                date: "지금막" // hardcoded
            };
            postComments.push(newComment);
            renderComments(1);
            document.getElementById('new-comment-text').value = '';
        }
    }

    function deleteComment(commentId, postId) {
        postComments = postComments.filter(c => c.id !== commentId);
        renderComments(postId);
    }

    // --- Navigation ---
    function openPost(postId) {
        document.getElementById('view-homepage').style.display = 'none';
        document.getElementById('view-post').style.display = 'block';
        document.getElementById('comment-input-area').style.display = 'flex';
        renderComments(postId);
    }

    function goHome() {
        document.getElementById('view-homepage').style.display = 'block';
        document.getElementById('view-post').style.display = 'none';
        document.getElementById('comment-input-area').style.display = 'none';
    }

    document.querySelector('.bottom-menu-icon.home').onclick = goHome;

    // --- Initialization ---
    renderCategories();
    renderPostList();
</script>

</body>
</html>
