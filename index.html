<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디시인스티즈</title>
    <style>
        /* 기본 리셋 및 폰트 설정 */
        * { box-sizing: border-box; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; }
        body { margin: 0; background-color: #f4f5f7; color: #333; }
        
        /* 인스티즈풍 초록색 상단바 */
        .header {
            background-color: #2db400; /* 인스티즈 특유의 초록색 */
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: -1px; cursor: pointer; }
        
        /* 검색창 */
        .search-area { display: flex; gap: 5px; }
        .search-area input {
            padding: 6px 12px;
            border-radius: 20px;
            border: none;
            outline: none;
            font-size: 14px;
        }
        .search-area button {
            background-color: white;
            color: #2db400;
            border: none;
            border-radius: 20px;
            padding: 6px 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .search-area button:hover { background-color: #e8f5e9; }

        /* 메인 컨테이너 */
        .container {
            max-width: 800px;
            margin: 30px auto;
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* 섹션 공통 */
        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #2db400;
            border-bottom: 2px solid #2db400;
            padding-bottom: 5px;
            margin-bottom: 15px;
            display: inline-block;
        }
        .box { margin-bottom: 40px; }

        /* 입력 및 버튼 폼 */
        input[type="text"], input[type="datetime-local"], select, textarea {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
        }
        textarea { width: 100%; resize: vertical; margin-top: 10px; font-size: 14px; }
        
        .btn {
            padding: 8px 12px;
            background-color: #2db400;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn-edit { background-color: #f39c12; }
        .btn-delete { background-color: #e74c3c; }

        /* 리스트 (카테고리, 댓글) */
        ul { list-style: none; padding: 0; margin: 0; }
        li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
        }
        .controls { display: flex; gap: 5px; }

        /* 가짜 게시물 정보 */
        .post-info-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
    </style>
</head>
<body>

    <!-- 상단바 -->
    <header class="header">
        <div class="logo">디시인스티즈</div>
        <div class="search-area">
            <input type="text" id="searchInput" placeholder="게시글 검색...">
            <button onclick="searchPost()">검색</button>
        </div>
    </header>

    <main class="container">
        
        <!-- 1. 카테고리 관리 영역 -->
        <div class="box">
            <div class="section-title">카테고리 설정</div>
            <div style="margin-bottom: 10px; display: flex; gap: 5px;">
                <input type="text" id="newCategory" placeholder="추가할 카테고리명 입력" style="flex: 1;">
                <button class="btn" onclick="addCategory()">추가</button>
            </div>
            <ul id="categoryList">
                <!-- 자바스크립트로 렌더링 -->
            </ul>
        </div>

        <!-- 2. 게시글 조작 영역 -->
        <div class="box" style="background-color: #fbfbfb; padding: 20px; border-radius: 8px; border: 1px solid #eee;">
            <div class="section-title" style="border-bottom-color: #333; color: #333;">게시글 본문 조작</div>
            
            <div class="post-info-row">
                <div>
                    <label style="font-size: 13px; font-weight: bold;">카테고리 선택:</label>
                    <select id="postCategorySelect"></select>
                </div>
                <div style="display: flex; align-items: center; gap: 5px;">
                    <label style="font-size: 13px; font-weight: bold;">글 쓴 날짜 조작:</label>
                    <input type="datetime-local" id="dateInput">
                    <button class="btn" onclick="applyDate()">날짜 적용</button>
                </div>
            </div>

            <div style="font-size: 12px; color: #888; margin-bottom: 10px;">
                현재 표시되는 작성일: <span id="displayDate" style="color: #2db400; font-weight: bold;"></span>
            </div>

            <input type="text" placeholder="제목을 입력하세요" style="width: 100%; font-size: 18px; font-weight: bold; border: none; border-bottom: 1px solid #ddd; border-radius: 0; padding: 10px 5px;">
            <textarea rows="6" placeholder="여기에 게시글 내용을 작성하세요..."></textarea>
        </div>

        <!-- 3. 댓글 관리 영역 -->
        <div class="box">
            <div class="section-title">댓글 목록</div>
            <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                <input type="text" id="newComment" placeholder="댓글을 남겨보세요..." style="flex: 1;">
                <button class="btn" onclick="addComment()">등록</button>
            </div>
            <ul id="commentList">
                <!-- 자바스크립트로 렌더링 -->
            </ul>
        </div>

    </main>

    <script>
        // --- 상태 관리 ---
        let categories = ['유머', '일상', '익명', '연예'];
        let comments = ['초록색 상단바 이쁘네요!', '디시인스티즈 화이팅!!'];
        
        // --- 1. 검색 기능 ---
        function searchPost() {
            const keyword = document.getElementById('searchInput').value;
            if(!keyword) return alert('검색어를 입력해주세요.');
            alert(`"${keyword}"에 대한 검색 결과가 없습니다.\n(가짜 커뮤니티라서 검색 기능은 연출입니다😉)`);
        }

        // --- 2. 카테고리 기능 ---
        function renderCategories() {
            const list = document.getElementById('categoryList');
            const select = document.getElementById('postCategorySelect');
            list.innerHTML = '';
            select.innerHTML = '';

            categories.forEach((cat, index) => {
                // 리스트 렌더링
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>📁 ${cat}</span>
                    <div class="controls">
                        <button class="btn btn-edit" onclick="editCategory(${index})">수정</button>
                        <button class="btn btn-delete" onclick="deleteCategory(${index})">삭제</button>
                    </div>
                `;
                list.appendChild(li);

                // 셀렉트 박스 렌더링
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });
        }

        function addCategory() {
            const input = document.getElementById('newCategory');
            if(input.value.trim() === '') return alert('카테고리명을 입력하세요.');
            categories.push(input.value.trim());
            input.value = '';
            renderCategories();
        }

        function editCategory(index) {
            const newName = prompt('수정할 카테고리 이름을 입력하세요:', categories[index]);
            if(newName && newName.trim() !== '') {
                categories[index] = newName.trim();
                renderCategories();
            }
        }

        function deleteCategory(index) {
            if(confirm('정말 이 카테고리를 삭제하시겠습니까?')) {
                categories.splice(index, 1);
                renderCategories();
            }
        }

        // --- 3. 날짜 조작 기능 ---
        function applyDate() {
            const dateInput = document.getElementById('dateInput').value;
            if(!dateInput) return alert('날짜를 먼저 선택해주세요!');
            
            // 날짜 포맷 예쁘게 변경
            const dateObj = new Date(dateInput);
            const formatted = `${dateObj.getFullYear()}.${String(dateObj.getMonth()+1).padStart(2, '0')}.${String(dateObj.getDate()).padStart(2, '0')} ${String(dateObj.getHours()).padStart(2, '0')}:${String(dateObj.getMinutes()).padStart(2, '0')}`;
            
            document.getElementById('displayDate').textContent = formatted;
        }

        // 초기 날짜 세팅
        window.onload = () => {
            renderCategories();
            renderComments();
            
            // 현재 시간을 기본값으로
            const now = new Date();
            const localIso = new Date(now.getTime() - (now.getTimezoneOffset() * 60000)).toISOString().slice(0,16);
            document.getElementById('dateInput').value = localIso;
            applyDate();
        }

        // --- 4. 댓글 기능 ---
        function renderComments() {
            const list = document.getElementById('commentList');
            list.innerHTML = '';
            
            if(comments.length === 0) {
                list.innerHTML = '<li style="color: #999; justify-content: center;">등록된 댓글이 없습니다.</li>';
                return;
            }

            comments.forEach((comment, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>💬 ${comment}</span>
                    <button class="btn btn-delete" onclick="deleteComment(${index})">삭제</button>
                `;
                list.appendChild(li);
            });
        }

        function addComment() {
            const input = document.getElementById('newComment');
            if(input.value.trim() === '') return alert('댓글 내용을 입력하세요.');
            comments.push(input.value.trim());
            input.value = '';
            renderComments();
        }

        function deleteComment(index) {
            if(confirm('이 댓글을 삭제할까요?')) {
                comments.splice(index, 1);
                renderComments();
            }
        }
    </script>
</body>
</html>
